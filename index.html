    <!-- JSON-LD: FAQPage schema (iter 180). Вопросы соответствуют FAQ-секции в SeoBlock.tsx.
         Google FAQ rich results deprecated для большинства сайтов (2023), но Yandex и

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Что такое regex в PoE2 и зачем он нужен?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Regex (регулярное выражение) в Path of Exile 2 — это поисковая строка с упрощённым синтаксисом для фильтрации предметов прямо в игре. С его помощью можно отобрать путевые камни с нужными модификаторами, найти кольца с конкретными свойствами или отфильтровать товары торговца. Строка ограничена 250 символами, поэтому требуется оптимизация."
          }
        },
        {
          "@type": "Question",
          "name": "Как работает ёфикация в PoE2?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Русский текст аффиксов в PoE2 может содержать как букву «е», так и «ё». Генератор автоматически применяет ёфикацию — объединяет оба варианта в символьный класс [её], что сокращает длину поисковой строки и гарантирует совпадение независимо от написания в конкретном предмете. Это особенно важно при выборе 6 и более аффиксов, когда суммарная длина регулярного выражения приближается к лимиту 250 символов."
          }
        },
        {
          "@type": "Question",
          "name": "Почему мой regex длиннее 250 символов?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Поисковая строка PoE2 имеет жёсткий лимит 250 символов. Если выбранных аффиксов слишком много, генератор показывает предупреждение «ПЕРЕПОЛНЕНИЕ». В этом случае попробуйте уменьшить количество выбранных аффиксов, сузить числовые диапазоны или исключить наименее важные свойства. Оптимизатор автоматически сокращает regex через дедупликацию, группировку и усечение слов, но иногда лимит невозможно обойти без сокращения числа условий."
          }
        },
        {
          "@type": "Question",
          "name": "Как поделиться фильтром с друзьями?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Нажмите кнопку «Поделиться» рядом с готовым регексом. Ссылка закодирует все выбранные аффиксы, числовые диапазоны и исключения в hash-части URL. Скопируйте ссылку и отправьте — открыв её, получатель увидит ваш фильтр в точно таком же виде. Также можно сохранить набор аффиксов в профиле (localStorage) для повторного использования."
          }
        },
        {
          "@type": "Question",
          "name": "Какие категории предметов поддерживает генератор?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Генератор работает со всеми основными категориями Path of Exile 2 в русском клиенте: путевые камни (включая осквернённые и очернённые), башни предтеч (ритуал, бездна, делириум, ваал, экспедиция), реликвии, самоцветы (рубин/изумруд/сапфир), вневременные самоцветы (Вечная ненависть и Трагедия героев — подсветка нод древа атласа), торговец, пояса, кольца, амулеты. Всего 9 категорий."
          }
        },
        {
          "@type": "Question",
          "name": "Чем отличаются режимы «Все (И)», «Любой (ИЛИ)» и «Смешанный»?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "«Все (И)» — поиск найдёт только предметы, у которых есть ВСЕ выбранные аффиксы. «Любой (ИЛИ)» — достаточно хотя бы одного. «Смешанный» — комбинирует оба: обязательные аффиксы (И) + опциональные (хотя бы один из группы). Клик по чипу — обязательный, Shift+клик — опциональный, правый клик — исключить."
          }
        }
