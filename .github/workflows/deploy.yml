name: Build + Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_etl:
        description: 'Run ETL pipeline (fetch fresh data from poe2db.tw)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  schedule:
    # Weekly ETL refresh — every Monday at 06:00 UTC
    - cron: '0 6 * * 1'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  etl:
    name: ETL Pipeline
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_etl == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable corepack (respects packageManager field)
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run ETL pipeline
        run: pnpm etl
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
      - name: Commit updated JSON data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/generated/
          git diff --cached --quiet || git commit -m "chore: update generated data from ETL [skip ci]"
          git push

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [etl]
    if: always() && (needs.etl.result == 'success' || needs.etl.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.etl.result == 'success' && 'refs/heads/main' || '' }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable corepack (respects packageManager field)
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm test
      - name: Build production bundle
        run: pnpm build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: always() && needs.build.result == 'success'
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
        id: deployment
