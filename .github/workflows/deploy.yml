name: Build + Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_etl:
        description: 'Run ETL pipeline (fetch fresh data from poe2db.tw)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  schedule:
    # Weekly ETL refresh — every Monday at 06:00 UTC
    - cron: '0 6 * * 1'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  etl:
    name: ETL Pipeline
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_etl == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable corepack (respects packageManager field)
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run ETL pipeline
        run: pnpm etl
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
      - name: Commit updated JSON data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/generated/
          git diff --cached --quiet || git commit -m "chore: update generated data from ETL [skip ci]"
          git push

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [etl]
    if: always() && (needs.etl.result == 'success' || needs.etl.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.etl.result == 'success' && 'refs/heads/main' || '' }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable corepack (respects packageManager field)
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      - name: Run tests
        run: pnpm test
      - name: Build with full pre-rendering
        run: pnpm build:full
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: always() && needs.build.result == 'success'
    permissions:
      pages: write
      id-token: write
    steps:
      # KI#43 (iter 155): actions/deploy-pages intermittently fails with a
      # transient Pages API error (race between two consecutive pushes, internal
      # GitHub error). Build artifact is fine — only the deploy step fails (~6s).
      # Wrap with wretry.action: 3 attempts, 30s delay between attempts.
      # See STATUS.md → KI#43 for incident details.
      - name: Deploy to Pages (with retry — KI#43)
        uses: Wandalen/wretry.action@v3
        id: deployment
        with:
          action: actions/deploy-pages@v4
          attempt_limit: 3
          attempt_delay: 30

  indexnow:
    name: Notify IndexNow
    runs-on: ubuntu-latest
    needs: deploy
    if: always() && needs.deploy.result == 'success'
    steps:
      - name: Submit URLs to IndexNow
        run: |
          curl -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "vudirvp-sketch.github.io",
              "key": "7cf0e35e568e2791d08835cdbd1d8a97",
              "urlList": [
                "https://vudirvp-sketch.github.io/poe2-regex-ru/",
                "https://vudirvp-sketch.github.io/poe2-regex-ru/waystone",
                "https://vudirvp-sketch.github.io/poe2-regex-ru/tablet",
                "https://vudirvp-sketch.github.io/poe2-regex-ru/relic",
                "https://vudirvp-sketch.github.io/poe2-regex-ru/jewel",
                "https://vudirvp-sketch.github.io/poe2-regex-ru/vendor",
                "https://vudirvp-sketch.github.io/poe2-regex-ru/belt",
                "https://vudirvp-sketch.github.io/poe2-regex-ru/ring",
                "https://vudirvp-sketch.github.io/poe2-regex-ru/amulet"
              ]
            }'
        continue-on-error: true
