    <!-- SPA redirect: GitHub Pages serves 404.html for non-existent paths.
         This script redirects to index.html with the path encoded in the query
         string, where the React app reads it and restores the correct route. -->
    <script>
      // Single-page app redirect script for GitHub Pages
      // When a 404.html is served, redirect to index.html with the path
      // stored in sessionStorage so the React app can restore the route
      var path = window.location.pathname.slice('/poe2-regex-ru'.length);
      sessionStorage.redirect = path;
      window.location.replace('/poe2-regex-ru/' + window.location.search + window.location.hash);
    </script>
